<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Definitions -->
  <defs>
    <!-- Burgundy gradient -->
    <radialGradient id="burgundyRadial" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#B93A4A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8B2635;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5D1A24;stop-opacity:1" />
    </radialGradient>
    
    <!-- Gold gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    
    <!-- Background -->
    <radialGradient id="bg" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#FFFEF8;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#FFF5E6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFECD0;stop-opacity:1" />
    </radialGradient>
    
    <!-- Pattern -->
    <pattern id="pattern" x="0" y="0" width="25" height="25" patternUnits="userSpaceOnUse">
      <circle cx="12.5" cy="12.5" r="1" fill="#8B2635" opacity="0.1"/>
    </pattern>
    
    <!-- Shadow -->
    <filter id="shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <g transform="translate(200, 200)">
    <!-- Frame -->
    <circle cx="0" cy="0" r="150" fill="url(#burgundyRadial)" stroke="#4A1419" stroke-width="3"/>
    <circle cx="0" cy="0" r="138" fill="none" stroke="#D4A574" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="130" fill="url(#bg)"/>
    
    <!-- Pattern -->
    <circle cx="0" cy="0" r="130" fill="url(#pattern)"/>
    
    <!-- Decorative circles -->
    <circle cx="0" cy="0" r="105" fill="none" stroke="#8B2635" stroke-width="0.5" opacity="0.2"/>
    <circle cx="0" cy="0" r="80" fill="none" stroke="#8B2635" stroke-width="0.5" opacity="0.2"/>
    
    <!-- Large Checkmark/Tick -->
    <g filter="url(#shadow)">
      <!-- Checkmark stroke -->
      <path d="M -35,0 L -10,35 L 45,-40" 
            fill="none" 
            stroke="url(#goldGrad)" 
            stroke-width="16" 
            stroke-linecap="round" 
            stroke-linejoin="round"/>
    </g>
    
    <!-- Text - split into two lines -->
    <text x="0" y="-70" font-family="Georgia, serif" font-size="20" font-weight="bold"
          fill="#5D1A24" text-anchor="middle" letter-spacing="1.5">
      Hónap
    </text>
    
    <text x="0" y="75" font-family="Georgia, serif" font-size="20" font-weight="bold"
          fill="#5D1A24" text-anchor="middle" letter-spacing="1.5">
      Vizsgamestere
    </text>
  </g>
</svg>
