<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Definitions -->
  <defs>
    <!-- Blue gradient -->
    <radialGradient id="blueRadial" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2B6CB0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E4A7A;stop-opacity:1" />
    </radialGradient>
    
    <linearGradient id="blueLinear" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5A9FED;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2B6CB0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A3A5A;stop-opacity:1" />
    </linearGradient>
    
    <!-- Gold gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE66D;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    
    <!-- Background -->
    <radialGradient id="bg" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#F0F8FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0F0FF;stop-opacity:1" />
    </radialGradient>
    
    <!-- Pattern -->
    <pattern id="sportPattern" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#2B6CB0" opacity="0.12"/>
    </pattern>
    
    <!-- Shadow -->
    <filter id="shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <g transform="translate(200, 200)">
    <!-- Frame -->
    <circle cx="0" cy="0" r="150" fill="url(#blueRadial)" stroke="#1A3A5A" stroke-width="3"/>
    <circle cx="0" cy="0" r="138" fill="none" stroke="#5A9FED" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="130" fill="url(#bg)"/>
    
    <!-- Pattern -->
    <circle cx="0" cy="0" r="130" fill="url(#sportPattern)"/>
    
    <!-- Decorative circles -->
    <circle cx="0" cy="0" r="105" fill="none" stroke="#2B6CB0" stroke-width="0.5" opacity="0.2"/>
    <circle cx="0" cy="0" r="80" fill="none" stroke="#2B6CB0" stroke-width="0.5" opacity="0.2"/>
    
    <!-- Trophy -->
    <g filter="url(#shadow)">
      <!-- Trophy cup body -->
      <path d="M -25,-20 L -20,-20 L -15,15 Q -15,20 0,20 Q 15,20 15,15 L 20,-20 L 25,-20 L 25,-25 L -25,-25 Z" 
            fill="url(#goldGrad)"/>
      
      <!-- Trophy handles -->
      <path d="M -25,-20 Q -40,-15 -40,0 Q -40,10 -30,12 L -25,5" 
            fill="none" stroke="url(#goldGrad)" stroke-width="4"/>
      <path d="M 25,-20 Q 40,-15 40,0 Q 40,10 30,12 L 25,5" 
            fill="none" stroke="url(#goldGrad)" stroke-width="4"/>
      
      <!-- Trophy stem -->
      <rect x="-8" y="20" width="16" height="15" fill="url(#goldGrad)"/>
      
      <!-- Trophy base -->
      <rect x="-20" y="35" width="40" height="8" rx="2" fill="url(#goldGrad)"/>
      
      <!-- Star on trophy -->
      <path d="M 0,-15 L 3,-8 L 10,-8 L 5,-3 L 7,4 L 0,0 L -7,4 L -5,-3 L -10,-8 L -3,-8 Z" 
            fill="url(#blueLinear)"/>
      
      <!-- Number 1 on trophy -->
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="16" font-weight="bold"
            fill="url(#blueLinear)" text-anchor="middle">1</text>
    </g>
    
    <!-- Text - split into two lines -->
    <text x="0" y="-70" font-family="Arial, sans-serif" font-size="20" font-weight="bold"
          fill="#1A3A5A" text-anchor="middle" letter-spacing="1.5">
      Képzési
    </text>
    
    <text x="0" y="75" font-family="Arial, sans-serif" font-size="20" font-weight="bold"
          fill="#1A3A5A" text-anchor="middle" letter-spacing="1.5">
      Bajnok
    </text>
  </g>
</svg>
