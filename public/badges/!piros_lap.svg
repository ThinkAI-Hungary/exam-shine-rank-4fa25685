<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Definitions -->
  <defs>
    <!-- Red/Critical gradient -->
    <radialGradient id="redRadial" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#FF5252;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F44336;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C62828;stop-opacity:1" />
    </radialGradient>
    
    <linearGradient id="redLinear" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8A80;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F44336;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B71C1C;stop-opacity:1" />
    </linearGradient>
    
    <!-- Dark red for symbol -->
    <linearGradient id="darkRed" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D32F2F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B71C1C;stop-opacity:1" />
    </linearGradient>
    
    <!-- Light background -->
    <radialGradient id="lightBg" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#FFF5F5;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#FFEBEE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFCDD2;stop-opacity:1" />
    </radialGradient>
    
    <!-- Warning pattern -->
    <pattern id="criticalPattern" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect x="0" y="0" width="5" height="10" fill="#F44336" opacity="0.1"/>
    </pattern>
    
    <!-- Soft shadow -->
    <filter id="softShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="1" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <g transform="translate(200, 200)">
    <!-- Outer red ring -->
    <circle cx="0" cy="0" r="150" fill="url(#redRadial)" stroke="#B71C1C" stroke-width="2"/>
    
    <!-- Inner rings -->
    <circle cx="0" cy="0" r="140" fill="none" stroke="#FF8A80" stroke-width="1"/>
    <circle cx="0" cy="0" r="132" fill="url(#lightBg)"/>
    
    <!-- Critical pattern -->
    <circle cx="0" cy="0" r="132" fill="url(#criticalPattern)"/>
    
    <!-- Red card icon (centered) -->
    <g filter="url(#softShadow)">
      <!-- Card shape -->
      <rect x="-35" y="-55" width="70" height="95" rx="5" 
            fill="url(#redLinear)" stroke="#B71C1C" stroke-width="3"/>
      
      <!-- Card corner fold -->
      <path d="M 35,-55 L 35,-38 L 18,-55 Z" fill="#EF5350" opacity="0.6"/>
      
      <!-- X symbol on card (critical/stop) -->
      <g stroke="url(#darkRed)" stroke-width="5" stroke-linecap="round">
        <line x1="-15" y1="-20" x2="15" y2="10"/>
        <line x1="15" y1="-20" x2="-15" y2="10"/>
      </g>
      
      <!-- Circle around X -->
      <circle cx="0" cy="-5" r="22" fill="none" stroke="url(#darkRed)" stroke-width="3.5"/>
    </g>
    
    <!-- Text -->
    <text x="0" y="100" font-family="Arial, sans-serif" font-size="20" font-weight="bold"
          fill="#B71C1C" text-anchor="middle" letter-spacing="1">
      Piros lap
    </text>
  </g>
</svg>
