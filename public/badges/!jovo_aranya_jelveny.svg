<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Definitions -->
  <defs>
    <!-- Premium Gold gradient -->
    <radialGradient id="goldRadial" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFA500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </radialGradient>
    
    <linearGradient id="goldLinear" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF4D0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    
    <!-- Dark Blue (Navy) -->
    <linearGradient id="navyBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A8A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F1E47;stop-opacity:1" />
    </linearGradient>
    
    <!-- Light background -->
    <radialGradient id="bgLight" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#FFFEF5;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#FFF9E6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFF4D0;stop-opacity:1" />
    </radialGradient>
    
    <!-- Soft shadow -->
    <filter id="premiumShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="1" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.25"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <g transform="translate(200, 200)">
    <!-- Outer gold ring -->
    <circle cx="0" cy="0" r="150" fill="url(#goldRadial)" stroke="#B8860B" stroke-width="2"/>
    
    <!-- Inner ring -->
    <circle cx="0" cy="0" r="140" fill="none" stroke="#FFE680" stroke-width="1"/>
    <circle cx="0" cy="0" r="132" fill="url(#bgLight)"/>
    
    <!-- Clean design - crown and diamond -->
    <g filter="url(#premiumShadow)">
      <!-- 3-pointed crown - simple triangular peaks on rectangle -->
      <g transform="translate(0, -35)">
        <!-- Crown base rectangle -->
        <rect x="-40" y="0" width="80" height="12" fill="url(#goldLinear)"/>
        
        <!-- Left triangle peak -->
        <path d="M -35,0 L -25,-20 L -15,0 Z" fill="url(#goldLinear)"/>
        
        <!-- Center triangle peak (slightly taller) -->
        <path d="M -10,0 L 0,-25 L 10,0 Z" fill="url(#goldLinear)"/>
        
        <!-- Right triangle peak -->
        <path d="M 15,0 L 25,-20 L 35,0 Z" fill="url(#goldLinear)"/>
        
        <!-- Jewels on peaks -->
        <circle cx="-25" cy="-20" r="3.5" fill="url(#navyBlue)"/>
        <circle cx="0" cy="-25" r="4" fill="url(#navyBlue)"/>
        <circle cx="25" cy="-20" r="3.5" fill="url(#navyBlue)"/>
      </g>
      
      <!-- Classic diamond shape below crown -->
      <g transform="translate(0, 10)">
        <!-- Diamond top facets -->
        <path d="M 0,-30 L -25,-10 L -25,5 L 0,35 L 25,5 L 25,-10 Z" 
              fill="url(#navyBlue)"/>
        
        <!-- Diamond facet lines for depth -->
        <path d="M 0,-30 L 0,35 M -25,-10 L 0,-30 L 25,-10 M -25,-10 L 0,5 L 25,-10 M -25,5 L 0,5 L 25,5" 
              stroke="url(#goldLinear)" stroke-width="1.5" opacity="0.4"/>
      </g>
    </g>
    
    <!-- Text -->
    <text x="0" y="100" font-family="Garamond, Georgia, serif" font-size="22" font-weight="600"
          fill="#5A4A2A" text-anchor="middle" letter-spacing="2">
      A jövő aranya
    </text>
  </g>
</svg>
